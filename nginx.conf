server {
    listen 8080;
    server_name localhost;

    # ─── SECURITY HEADERS ───────────────────────────────────────
    # Prevent clickjacking — FlowPass should never be embedded in iframes
    add_header X-Frame-Options "DENY" always;
    
    # Prevent MIME type sniffing attacks
    add_header X-Content-Type-Options "nosniff" always;
    
    # Enable XSS filter in browsers that support it
    add_header X-XSS-Protection "1; mode=block" always;

    # Only allow resources from our own origin + Supabase + Google Services
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://translate.google.com https://*.translate.google.com https://translate.googleapis.com https://*.translate.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://translate.googleapis.com https://*.translate.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://translate.googleapis.com https://*.translate.googleapis.com https://www.google-analytics.com https://www.googletagmanager.com https://translate.google.com https://*.translate.google.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://www.google-analytics.com https://generativelanguage.googleapis.com https://translate.googleapis.com https://*.translate.googleapis.com; frame-src https://translate.google.com https://*.translate.google.com https://translate.googleapis.com https://*.translate.googleapis.com; frame-ancestors 'none';" always;

    # Control what information is sent in the Referer header
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restrict browser features the app doesn't need
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=()" always;

    # Prevent search engines from caching sensitive event data
    add_header X-Robots-Tag "noarchive" always;

    # ─── GZIP COMPRESSION ───────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # ─── SPA ROUTING ────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # ─── STATIC ASSET CACHING ──────────────────────────────────
    # Vite adds content hashes to filenames, so 1-year cache is safe
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable, no-transform";
    }

    # ─── BLOCK SENSITIVE FILES ─────────────────────────────────
    # Prevent access to dotfiles (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
